<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>%INDEX_PAGE_TITLE%</title>
    <script>
      ;(function () {
        const stored = localStorage.getItem("darkModeSelect") || "system"
        const isDark =
          stored === "dark" || (stored === "system" && window.matchMedia("(prefers-color-scheme: dark)").matches)
        const root = document.documentElement
        root.classList.add(isDark ? "dark" : "light")
        root.style.colorScheme = isDark ? "dark" : "light"
        root.style.setProperty("background-color", isDark ? "#000" : "#fff")
        root.style.setProperty("color", isDark ? "#fff" : "#000")
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="pages/render/index.tsx"></script>
  </body>
</html>
